name: Build Terminal Master Hub APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install build tools and platform
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Ubuntu rootfs from latest release
        run: |
          echo "Downloading Ubuntu 24.04 ARM64 rootfs..."
          mkdir -p app/src/main/assets/ubuntu/
          # Intentar descargar desde el release v1.3.8 (el rootfs esta como asset)
          ROOTFS_URL="https://github.com/MichaelARC-NI/TerminalMasterHub/releases/download/v1.3.8/ubuntu-base-24.04.4-base-arm64.tar.gz"
          ROOTFS_FILE="app/src/main/assets/ubuntu/ubuntu-rootfs.tar.gz"
          curl -fSL -o "$ROOTFS_FILE" "$ROOTFS_URL" 2>&1 || {
            echo "Fallback: copiando rootfs placeholder..."
            # Crear un placeholder - el build fallara si no hay rootfs
            echo "ERROR: No se pudo descargar rootfs Ubuntu" >&2
            exit 1
          }
          ls -lh "$ROOTFS_FILE"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TerminalMasterHub-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TerminalMasterHub-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Terminal Master Hub v${{ github.run_number }}"
          body: |
            ## Terminal Master Hub
            
            APK generado automáticamente.
            
            ### Redes del Desarrollador:
            - GitHub: https://github.com/MichaelARC-NI
            - Telegram: https://t.me/ErosMobileTool
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
