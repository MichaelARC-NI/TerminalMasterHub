name: Build Terminal Master Hub APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install build tools and platform
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Ubuntu rootfs from release
        run: |
          echo "Downloading Ubuntu 24.04 ARM64 rootfs..."
          mkdir -p app/src/main/assets/ubuntu/
          ROOTFS_URL="https://github.com/MichaelARC-NI/TerminalMasterHub/releases/download/v1.3.8/ubuntu-base-24.04.4-base-arm64.tar.gz"
          ROOTFS_FILE="app/src/main/assets/ubuntu/ubuntu_rootfs"
          echo "Downloading from: $ROOTFS_URL"
          curl -fSL --retry 3 --retry-delay 5 -o "$ROOTFS_FILE" "$ROOTFS_URL" 2>&1 || {
            echo "ERROR: No se pudo descargar rootfs Ubuntu"
            echo "Los assets actuales se usaran si existen"
            ls -la app/src/main/assets/ubuntu/ 2>/dev/null || true
          }
          if [ -f "$ROOTFS_FILE" ]; then
            ls -lh "$ROOTFS_FILE"
          else
            echo "Usando assets locales si existen..."
            ls -la app/src/main/assets/ubuntu/ 2>/dev/null || echo "No assets locales"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TerminalMasterHub-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TerminalMasterHub-release
          path: app/build/outputs/apk/release/*.apk
